name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# A new push to the same ref cancels an in-progress run (frees a hung/slow e2e).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (lint · build · test)
    runs-on: ubuntu-latest
    # Redis is available for any BullMQ/queue module that connects at bootstrap.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      # e2e drives the maintenance service directly; the cron scheduler stays off in CI.
      ENABLE_SCHEDULER: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          # apps/api is a root npm workspace — the lockfile lives at the repo root.
          cache-dependency-path: package-lock.json
      - name: Install (root workspace)
        run: npm ci
      - name: Prisma generate
        working-directory: apps/api
        run: npm run prisma:generate
      - name: Lint
        working-directory: apps/api
        run: npm run lint
      - name: Build
        working-directory: apps/api
        run: npm run build
      - name: Unit tests
        working-directory: apps/api
        run: npm run test:unit
      - name: e2e tests (Testcontainers — isolation + lineage + auth + M2 gates)
        # Docker is available on ubuntu runners; Testcontainers spins up real PostgreSQL 16.
        # --forceExit guards against a lingering Socket.IO/Prisma handle stalling the runner.
        working-directory: apps/api
        run: npm run test:e2e -- --forceExit

  admin-web:
    name: admin-web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin-web/package-lock.json
      - run: npm ci
      - run: npm run build

  platform-web:
    name: platform-web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/platform-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/platform-web/package-lock.json
      - run: npm ci
      - run: npm run build

  mobile:
    name: mobile (flutter analyze · test · build apk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      # Android build gate (Spec §10·M5.1). iOS build needs a macOS runner + the
      # Xcode project generated at deploy time (see apps/mobile/README) — out of Linux CI.
      - run: flutter build apk --debug
  # NOTE: real-device gates (>=30fps, push <=10s, offline) and the iOS build are QA/deploy-time.
