# TFTSP local development stack — `docker compose up` brings up the full environment.
# Infra (postgres/redis/minio/mailhog) is owned by the Lead foundation.
# Service build sections (api, admin-web, platform-web) are wired by their owning agents.

services:
  postgres:
    image: postgres:16-alpine
    container_name: tftsp-postgres
    environment:
      POSTGRES_USER: tftsp
      POSTGRES_PASSWORD: tftsp_dev_pw
      POSTGRES_DB: tftsp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tftsp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tftsp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tftsp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tftsp-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # --- Application services ---
  api:
    build: ./apps/api
    container_name: tftsp-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      # container-internal hostnames override the localhost defaults in .env
      DATABASE_URL: "postgresql://tftsp_app:tftsp_app_pw@postgres:5432/tftsp?schema=public"
      DATABASE_MIGRATION_URL: "postgresql://tftsp:tftsp_dev_pw@postgres:5432/tftsp?schema=public"
      REDIS_HOST: "redis"
      MINIO_ENDPOINT: "minio"
      SMTP_HOST: "mailhog"
    # Bound to localhost only — the app is reached through the gateway on ${TFTSP_PORT}.
    ports:
      - "127.0.0.1:3000:3000"

  # Single entry point: serves the Tribe Admin panel at /, the Super-Admin panel at
  # /platform/, and proxies /api + /socket.io to the API. One port for the whole system.
  gateway:
    build:
      context: .
      dockerfile: deploy/gateway.Dockerfile
    container_name: tftsp-gateway
    depends_on:
      - api
    ports:
      - "${TFTSP_PORT:-8080}:80"

  # One-off demo seed (Super Admin + 2 tribes). Run explicitly:
  #   docker compose run --rm seed
  seed:
    build:
      context: ./apps/api
      target: builder
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://tftsp:tftsp_dev_pw@postgres:5432/tftsp?schema=public"
    command: ["npm", "run", "seed"]

volumes:
  pg_data:
  minio_data:
