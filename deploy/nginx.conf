# TFTSP single-gateway: one port serves both web panels + proxies the API.
server {
    listen 80;
    server_name _;

    # allow the 50MB bulk-import upload (+ headroom)
    client_max_body_size 55m;

    # ---- REST API (includes Swagger at /api/docs) ----
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- WebSocket (in-app notifications + import progress) ----
    location /socket.io/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # ---- Super-Admin (platform) panel under /platform/ ----
    location /platform/ {
        alias /usr/share/nginx/platform/;
        try_files $uri $uri/ /platform/index.html;
    }

    # ---- Tribe Admin panel at the root ----
    location / {
        root /usr/share/nginx/admin;
        try_files $uri $uri/ /index.html;
    }
}
