name: tftsp_mobile
description: "TFTSP Members App — tribal & family tree (Flutter, Android + iOS)."
publish_to: "none"
version: 1.0.0+1

# NOTE: no code generation is required to build this project.
# - API client: hand-written dio services (no retrofit / build_runner).
# - State: classic Riverpod (Notifier/Provider) — no riverpod_generator.
# - Offline cache: sqflite with hand-written SQL — no drift/build_runner.
# This keeps `flutter analyze` + `flutter test` green without a codegen step.

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking (dio_web_adapter uses the permissive `web >=0.5.0 <2.0.0`).
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Localization (AR RTL / EN LTR)
  easy_localization: ^3.0.7

  # Push notifications.
  # Modern FlutterFire set aligned on `package:web ^1.0.0` (same as
  # cached_network_image 3.4.x), coherent for Flutter 3.24.5 / Dart 3.5.
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Offline read cache (sqlite)
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Connectivity (offline badge / blocked writes).
  # 6.1.0 migrated its web impl to `package:web ^1.0.0` (avoids the 0.5.x split).
  connectivity_plus: ^6.1.0

  # Routing
  go_router: ^14.2.7

  # Images (presigned URLs)
  cached_network_image: ^3.4.1

  # Logging (never log tokens)
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
